<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Search</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #21253a;
      --border: #2e3450;
      --accent: #5b6ef8;
      --accent-hover: #7b8bff;
      --accent-dim: rgba(91, 110, 248, 0.15);
      --text: #e2e6f3;
      --text-muted: #6b7280;
      --text-dim: #9ca3af;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --tag-bg: #2a2e47;
      --match-bg: rgba(251, 191, 36, 0.18);
      --match-color: #fbbf24;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.3px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-subtitle {
      color: var(--text-muted);
      font-size: 12px;
      margin-left: 4px;
    }

    /* ── Main layout ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 24px;
      gap: 20px;
    }

    /* ── Search panel ── */
    .search-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-input-wrap {
      flex: 1;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 15px;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      padding: 10px 14px 10px 40px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    #searchInput:focus {
      border-color: var(--accent);
    }

    #searchInput::placeholder {
      color: var(--text-muted);
    }

    .btn {
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    /* options row */
    .options-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .option-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .option-label {
      color: var(--text-muted);
      font-size: 12px;
    }

    .seg-ctrl {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .seg-ctrl label {
      padding: 5px 12px;
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .seg-ctrl input {
      display: none;
    }

    .seg-ctrl input:checked+label {
      background: var(--accent);
      color: #fff;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-wrap input {
      display: none;
    }

    .toggle {
      width: 32px;
      height: 18px;
      background: var(--border);
      border-radius: 9px;
      position: relative;
      transition: background 0.2s;
    }

    .toggle::after {
      content: '';
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }

    .toggle-wrap input:checked~.toggle {
      background: var(--accent);
    }

    .toggle-wrap input:checked~.toggle::after {
      left: 16px;
    }

    .toggle-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* path row */
    .path-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .path-label {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    #pathInput {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      font-size: 12px;
      padding: 7px 12px;
      outline: none;
      transition: border-color 0.2s;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    #pathInput:focus {
      border-color: var(--accent);
      color: var(--text);
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
      padding: 0 2px;
      min-height: 22px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat-num {
      color: var(--accent);
      font-weight: 600;
    }

    .stat-green {
      color: var(--green);
      font-weight: 600;
    }

    /* ── Results ── */
    .results-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .file-card:hover {
      border-color: var(--accent);
    }

    .file-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .file-header:hover {
      background: var(--accent-dim);
    }

    .file-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-path {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .match-badge {
      flex-shrink: 0;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .chevron {
      flex-shrink: 0;
      color: var(--text-muted);
      font-size: 12px;
      transition: transform 0.2s;
    }

    .file-card.expanded .chevron {
      transform: rotate(90deg);
    }

    .match-list {
      display: none;
      border-top: 1px solid var(--border);
    }

    .file-card.expanded .match-list {
      display: block;
    }

    .match-item {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 8px 16px;
      border-bottom: 1px solid rgba(46, 52, 80, 0.5);
      transition: background 0.1s;
    }

    .match-item:last-child {
      border-bottom: none;
    }

    .match-item:hover {
      background: rgba(91, 110, 248, 0.07);
    }

    .line-num {
      flex-shrink: 0;
      width: 48px;
      text-align: right;
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      padding-right: 12px;
      border-right: 1px solid var(--border);
    }

    .match-content {
      flex: 1;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
    }

    .match-content mark {
      background: var(--match-bg);
      color: var(--match-color);
      border-radius: 3px;
      padding: 0 2px;
    }

    .more-matches {
      padding: 8px 16px;
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      background: var(--bg);
    }

    /* ── Empty / Loading states ── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px 20px;
      text-align: center;
    }

    .state-icon {
      font-size: 40px;
      opacity: 0.4;
    }

    .state-title {
      color: var(--text-dim);
      font-size: 15px;
      font-weight: 500;
    }

    .state-sub {
      color: var(--text-muted);
      font-size: 12px;
      max-width: 360px;
      line-height: 1.6;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Error ── */
    .error-box {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: var(--radius);
      padding: 14px 18px;
      color: var(--red);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #4a5080;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .main {
        padding: 16px;
      }

      .search-row {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="logo">
      <div class="logo-icon">🔍</div>
      Code Search
      <span class="header-subtitle">/ workspace</span>
    </div>
  </header>

  <main class="main">
    <!-- Search Panel -->
    <div class="search-panel">
      <div class="search-row">
        <div class="search-input-wrap">
          <span class="search-icon">⌕</span>
          <input id="searchInput" type="text" placeholder="输入关键词搜索代码..." autocomplete="off" spellcheck="false" />
        </div>
        <button class="btn btn-primary" id="searchBtn">
          <span>搜索</span>
        </button>
        <button class="btn btn-secondary" id="clearBtn">清空</button>
      </div>

      <!-- Options -->
      <div class="options-row">
        <div class="option-group">
          <span class="option-label">搜索模式</span>
          <div class="seg-ctrl">
            <input type="radio" name="mode" id="modeContent" value="content" checked />
            <label for="modeContent">内容</label>
            <input type="radio" name="mode" id="modeFilename" value="filename" />
            <label for="modeFilename">文件名</label>
          </div>
        </div>

        <label class="toggle-wrap">
          <input type="checkbox" id="caseSensitive" />
          <div class="toggle"></div>
          <span class="toggle-text">区分大小写</span>
        </label>

        <label class="toggle-wrap">
          <input type="checkbox" id="isRegex" />
          <div class="toggle"></div>
          <span class="toggle-text">正则表达式</span>
        </label>
      </div>

      <!-- Path -->
      <div class="path-row">
        <span class="path-label">搜索目录</span>
        <input id="pathInput" type="text" placeholder="/path/to/workspace" spellcheck="false" />
        <button class="btn btn-secondary" id="resetPathBtn" style="font-size:12px;padding:7px 14px;">重置</button>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar" id="statsBar"></div>

    <!-- Results area -->
    <div id="resultsArea">
      <div class="state-box">
        <div class="state-icon">💡</div>
        <div class="state-title">开始搜索</div>
        <div class="state-sub">在上方输入关键词，支持内容搜索和文件名搜索。<br />自动排除 node_modules、dist、.git 等目录。</div>
      </div>
    </div>
  </main>

  <script>
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const clearBtn = document.getElementById('clearBtn');
    const pathInput = document.getElementById('pathInput');
    const resetPathBtn = document.getElementById('resetPathBtn');
    const statsBar = document.getElementById('statsBar');
    const resultsArea = document.getElementById('resultsArea');

    let defaultPath = '';
    let lastSearch = null;

    // Fetch default workspace path
    fetch('/api/config')
      .then(r => r.json())
      .then(data => {
        defaultPath = data.workspacePath;
        pathInput.value = defaultPath;
        pathInput.placeholder = defaultPath;
      });

    resetPathBtn.addEventListener('click', () => {
      pathInput.value = defaultPath;
    });

    // File type icons
    function getFileIcon (filename) {
      const ext = filename.split('.').pop().toLowerCase();
      const map = {
        js: '🟨', jsx: '🟨', ts: '🔷', tsx: '🔷',
        vue: '💚', svelte: '🧡',
        html: '🌐', css: '🎨', scss: '🎨', sass: '🎨', less: '🎨',
        json: '📋', xml: '📋', yaml: '📋', yml: '📋', toml: '📋',
        py: '🐍', java: '☕', kt: '🟣', swift: '🦅',
        go: '🐹', rs: '🦀', cpp: '⚙️', c: '⚙️', h: '⚙️',
        php: '🐘', rb: '💎', sh: '🖥️', bash: '🖥️',
        md: '📝', txt: '📄', sql: '🗄️',
        env: '🔧', config: '🔧',
      };
      return map[ext] || '📄';
    }

    function escapeHtml (str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function highlightMatch (text, keyword, isRegex, isCaseSensitive) {
      if (!keyword) return escapeHtml(text);
      try {
        let pattern;
        if (isRegex) {
          pattern = new RegExp(`(${keyword})`, isCaseSensitive ? 'g' : 'gi');
        } else {
          const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          pattern = new RegExp(`(${escaped})`, isCaseSensitive ? 'g' : 'gi');
        }
        return escapeHtml(text).replace(
          new RegExp(pattern.source, pattern.flags),
          '<mark>$1</mark>'
        );
      } catch {
        return escapeHtml(text);
      }
    }

    function renderResults (data) {
      const { keyword, results, totalFiles, resultCount, elapsed, searchMode, isRegex, isCaseSensitive } = data;

      // Stats
      statsBar.innerHTML = `
      <div class="stat-item">扫描文件 <span class="stat-num">${totalFiles.toLocaleString()}</span></div>
      <div class="stat-item">匹配文件 <span class="stat-green">${resultCount}</span></div>
      <div class="stat-item">耗时 <span class="stat-num">${elapsed}ms</span></div>
    `;

      if (results.length === 0) {
        resultsArea.innerHTML = `
        <div class="state-box">
          <div class="state-icon">🔎</div>
          <div class="state-title">未找到匹配结果</div>
          <div class="state-sub">关键词 "<strong>${escapeHtml(keyword)}</strong>" 在 ${totalFiles} 个文件中未找到匹配。<br/>试试换个关键词或切换搜索模式。</div>
        </div>`;
        return;
      }

      const cards = results.map((item, idx) => {
        const filename = item.relativePath.split('/').pop();
        const dir = item.relativePath.includes('/')
          ? item.relativePath.substring(0, item.relativePath.lastIndexOf('/'))
          : '';

        const matchesHtml = item.matches.length > 0
          ? (() => {
            const show = item.matches.slice(0, 20);
            const more = item.matches.length - show.length;
            return show.map(m => `
              <div class="match-item">
                <div class="line-num">L${m.lineNumber}</div>
                <div class="match-content">${highlightMatch(m.content, keyword, isRegex, isCaseSensitive)}</div>
              </div>
            `).join('') + (more > 0 ? `<div class="more-matches">还有 ${more} 处匹配...</div>` : '');
          })()
          : '';

        const badgeCount = item.matches.length || '';
        const badgeHtml = item.matches.length > 0
          ? `<div class="match-badge">${item.matches.length} 处</div>`
          : '';

        return `
        <div class="file-card" id="card-${idx}">
          <div class="file-header" onclick="toggleCard(${idx})">
            <span class="file-icon">${getFileIcon(filename)}</span>
            <div class="file-info">
              <div class="file-name">${escapeHtml(filename)}</div>
              <div class="file-path">${escapeHtml(item.relativePath)}</div>
            </div>
            ${badgeHtml}
            <span class="chevron">${item.matches.length > 0 ? '▶' : ''}</span>
          </div>
          ${item.matches.length > 0 ? `<div class="match-list">${matchesHtml}</div>` : ''}
        </div>
      `;
      }).join('');

      resultsArea.innerHTML = `<div class="results-container">${cards}</div>`;
    }

    function toggleCard (idx) {
      const card = document.getElementById(`card-${idx}`);
      if (card) card.classList.toggle('expanded');
    }

    async function doSearch () {
      const keyword = searchInput.value.trim();
      if (!keyword) {
        searchInput.focus();
        return;
      }

      const searchMode = document.querySelector('input[name="mode"]:checked').value;
      const isCaseSensitive = document.getElementById('caseSensitive').checked;
      const isRegex = document.getElementById('isRegex').checked;
      const workspacePath = pathInput.value.trim() || defaultPath;

      statsBar.innerHTML = '';
      resultsArea.innerHTML = `
      <div class="state-box">
        <div class="spinner"></div>
        <div class="state-title">搜索中...</div>
      </div>`;

      searchBtn.disabled = true;
      searchBtn.textContent = '搜索中...';

      try {
        const resp = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keyword, workspacePath, searchMode, isRegex, isCaseSensitive }),
        });

        const data = await resp.json();

        if (!resp.ok) {
          resultsArea.innerHTML = `<div class="error-box">⚠️ ${escapeHtml(data.error || '搜索失败')}</div>`;
          statsBar.innerHTML = '';
          return;
        }

        renderResults({ ...data, searchMode, isRegex, isCaseSensitive });
      } catch (e) {
        resultsArea.innerHTML = `<div class="error-box">⚠️ 网络错误：${escapeHtml(e.message)}</div>`;
      } finally {
        searchBtn.disabled = false;
        searchBtn.textContent = '搜索';
      }
    }

    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      statsBar.innerHTML = '';
      resultsArea.innerHTML = `
      <div class="state-box">
        <div class="state-icon">💡</div>
        <div class="state-title">开始搜索</div>
        <div class="state-sub">在上方输入关键词，支持内容搜索和文件名搜索。<br/>自动排除 node_modules、dist、.git 等目录。</div>
      </div>`;
      searchInput.focus();
    });
  </script>
</body>

</html>
